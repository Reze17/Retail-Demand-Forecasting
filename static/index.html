<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store Product Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6dfa;
            --accent2: #f06ef0;
            --accent-glow: rgba(124, 109, 250, 0.35);
            --text: #e8e8f0;
            --text-dim: #7a7a90;
            --user-bubble: linear-gradient(135deg, #7c6dfa, #a855f7);
            --bot-bubble: #1a1a24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(124,109,250,0.12) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(240,110,240,0.08) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            height: 92vh;
            max-height: 820px;
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 80px rgba(0,0,0,0.6),
                0 0 120px rgba(124,109,250,0.08);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .chat-header {
            padding: 20px 24px 18px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px var(--accent-glow);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 300;
            margin-top: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22d3a0;
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 10px rgba(34, 211, 160, 0.6);
            animation: pulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
        }

        /* Message bubbles */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .avatar.bot {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        .avatar.user {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        .bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.6;
            font-weight: 400;
        }

        .bubble.bot {
            background: var(--bot-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble.user {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(124, 109, 250, 0.3);
        }

        /* Timestamp */
        .timestamp {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            padding: 0 4px;
            opacity: 0.6;
        }
        .message-row.user .timestamp { text-align: right; }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 10px;
        }
        .typing-indicator.visible { display: flex; }
        .typing-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .typing-bubble span {
            width: 7px;
            height: 7px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Suggestions */
        .suggestions {
            padding: 0 20px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .suggestions::-webkit-scrollbar { display: none; }
        .suggestion-chip {
            white-space: nowrap;
            padding: 7px 14px;
            border-radius: 100px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12.5px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124,109,250,0.08);
        }

        /* Input area */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-row:focus-within {
            border-color: rgba(124,109,250,0.4);
            box-shadow: 0 0 0 3px rgba(124,109,250,0.08);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14.5px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            padding: 8px 0;
        }

        .chat-input::placeholder { color: var(--text-dim); }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .send-button:hover {
            transform: scale(1.07);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .send-button:active { transform: scale(0.95); }

        .send-button svg { width: 18px; height: 18px; }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 10px;
            opacity: 0.5;
        }

        /* Welcome state */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 32px;
            text-align: center;
            gap: 12px;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 40px var(--accent-glow);
            margin-bottom: 4px;
        }

        .welcome-state h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .welcome-state p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 320px;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-icon">🛍️</div>
        <div class="header-text">
            <h1>Store Assistant</h1>
            <p>Powered by AI · Always available</p>
        </div>
        <div class="status-dot"></div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-state" id="welcomeState">
            <div class="welcome-icon">✦</div>
            <h2>How can I help you?</h2>
            <p>Ask me anything about our products — availability, pricing, recommendations, and more.</p>
        </div>
    </div>

    <!-- Typing indicator (outside messages, fixed at bottom of scroll area) -->

    <!-- Suggestions -->
    <div class="suggestions" id="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">What's on sale?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Best sellers</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">New arrivals</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Track my order</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Return policy</button>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <div class="input-row">
            <input
                type="text"
                id="chatInput"
                class="chat-input"
                placeholder="Ask about products, availability..."
                onkeypress="handleKeyPress(event)"
                autocomplete="off"
            />
            <button class="send-button" onclick="sendMessage()" aria-label="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
        <div class="input-hint">Press Enter to send · Powered by Claude</div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const welcomeState = document.getElementById("welcomeState");
    const suggestions = document.getElementById("suggestions");
    let messageCount = 0;

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function removeWelcome() {
        if (welcomeState && welcomeState.parentNode) {
            welcomeState.style.transition = 'opacity 0.3s';
            welcomeState.style.opacity = '0';
            setTimeout(() => welcomeState.remove(), 300);
        }
    }

    function addMessage(content, type) {
        removeWelcome();

        const row = document.createElement("div");
        row.classList.add("message-row", type);

        const avatar = document.createElement("div");
        avatar.classList.add("avatar", type);
        avatar.textContent = type === "bot" ? "✦" : "You";

        const col = document.createElement("div");
        col.style.display = "flex";
        col.style.flexDirection = "column";
        col.style.maxWidth = "74%";

        const bubble = document.createElement("div");
        bubble.classList.add("bubble", type);
        bubble.textContent = content;

        const ts = document.createElement("div");
        ts.classList.add("timestamp");
        ts.textContent = getTime();

        col.appendChild(bubble);
        col.appendChild(ts);

        if (type === "bot") {
            row.appendChild(avatar);
            row.appendChild(col);
        } else {
            row.appendChild(col);
            row.appendChild(avatar);
        }

        chatMessages.appendChild(row);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        messageCount++;

        // Hide suggestions after first interaction
        if (messageCount === 1) {
            suggestions.style.display = "none";
        }
    }

    function showTyping() {
        const indicator = document.createElement("div");
        indicator.classList.add("typing-indicator", "visible");
        indicator.id = "typingIndicator";

        const avatar = document.createElement("div");
        avatar.classList.add("avatar", "bot");
        avatar.textContent = "✦";

        const bubble = document.createElement("div");
        bubble.classList.add("typing-bubble");
        bubble.innerHTML = "<span></span><span></span><span></span>";

        indicator.appendChild(avatar);
        indicator.appendChild(bubble);
        chatMessages.appendChild(indicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return indicator;
    }

    function removeTyping() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
    }

    async function sendMessage() {
        const query = chatInput.value.trim();
        if (!query) return;

        addMessage(query, "user");
        chatInput.value = "";

        const typingEl = showTyping();
        chatMessages.scrollTop = chatMessages.scrollHeight;

        const formData = new FormData();
        formData.append("query", query);

        try {
            const response = await fetch("/call", {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            removeTyping();
            addMessage(data.message, "bot");
        } catch (error) {
            removeTyping();
            addMessage("Sorry, I couldn't connect to the server. Please try again.", "bot");
        }
    }

    function useSuggestion(btn) {
        chatInput.value = btn.textContent;
        chatInput.focus();
        sendMessage();
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>
</body>
</html>
